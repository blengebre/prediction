<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You | CBE & Visa</title>
  <style>
    :root {
      --deep-purple: #0f0c24;
      --gold: #D4AF37;
      --glass: rgba(255, 255, 255, 0.05);
      --text: #ffffff;
    }
    body {
      background: radial-gradient(circle at center, var(--deep-purple), #000);
      color: var(--text);
      font-family: 'Segoe UI', sans-serif;
      margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
    }
    /* New wrapper to stack items vertically */
.main-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 20px;
}
/* Ensure the header isn't too cramped */
.brand-header {
  margin-bottom: 30px;
}
/* Adjust the logo heights as needed */
.logo-cbe, .logo-visa {
  height: 50px;
  width: auto;
}
    .brand-header {
  display: flex;
  flex-direction: column;
  align-items: center; /* This centers everything horizontally */
  text-align: center;
  padding: 20px;
}
.logo-container {
  display: flex;       /* This puts items in a row */
  align-items: center; /* This aligns them vertically in the middle */
  justify-content: center; /* This ensures they are centered horizontally */
  gap: 20px;           /* Adds space between the two logos */
  margin-bottom: 10px;
}
/* Ensure the logos are treated as distinct blocks */
.logo-cbe {
  height: 45px; 
  width: auto;
}
.logo-visa {
  height: 45px; 
  width: auto;
}
.toast-hidden {
  display: none;
}

.toast-visible {
  position: fixed;
  bottom: 30px;
  background: var(--gold);
  color: var(--deep-purple);
  padding: 15px 30px;
  border-radius: 10px;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  animation: fadeIn 0.3s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
    .box {
      background: var(--glass);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      text-align: center;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h2 { color: var(--gold); margin-bottom: 10px; }
    input, textarea {
      width: 100%;
      margin: 15px 0;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--gold);
      color: white;
      border-radius: 8px;
      box-sizing: border-box;
    }
    .prime-btn {
      background: linear-gradient(45deg, var(--gold), #ffcc33);
      color: var(--deep-purple);
      border: none;
      padding: 12px 25px;
      cursor: pointer;
      border-radius: 8px;
      width: 100%;
      font-weight: bold;
      transition: transform 0.2s;
    }
    .prime-btn:hover { transform: scale(1.02); }
    .prime-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>
  <!-- Main Container -->
  <div class="main-wrapper">

    <header class="brand-header">
      <div class="logo-container">
        <img src="/cbe-logo-transparent.png" alt="CBE Logo" class="logo-cbe">
        <span style="color:white; opacity:0.5; font-size: 20px;">-</span>
        <img src="/visa-logo-white-transparent(1).png" alt="Visa Logo" class="logo-visa">
      </div>
    </header>
    <div class="box">
      <h2>Thank You!</h2>
      <p>The prediction window is closed. Your presence was appreciated.</p>

      <form id="feedbackForm">
        <input type="text" id="fbName" placeholder="Your Name" required>
        <textarea id="fbMessage" placeholder="Share your experience..." rows="4" required></textarea>
        <button type="submit" class="prime-btn" id="fbSubmit">Submit Feedback</button>
      </form>
    </div>
   <!-- Toast Notification -->
<div id="toast" class="toast-hidden">
  <p>Thank you for your feedback!</p>
</div>
  </div>
  <script>
    document.getElementById('feedbackForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = document.getElementById('fbSubmit');
  const toast = document.getElementById('toast');
  
  btn.disabled = true;
  btn.innerText = "Sending...";

  const payload = {
    name: document.getElementById('fbName').value,
    message: document.getElementById('fbMessage').value
  };

  try {
    const response = await fetch('/api/feedback', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    if (response.ok) {
      // Show the beautiful toast instead of alert
      toast.innerText = "Thank you for your feedback!";
      toast.className = "toast-visible";
      document.getElementById('feedbackForm').reset();
      
      // Hide it after 3 seconds
      setTimeout(() => { toast.className = "toast-hidden"; }, 3000);
    } else {
      alert("Error submitting feedback.");
    }
  } catch (err) {
    alert("Server error.");
  } finally {
    btn.disabled = false;
    btn.innerText = "Submit Feedback";
  }
};
  </script>
</body>
</html>
