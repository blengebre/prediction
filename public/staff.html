<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CBE & Visa — Staff Management Console</title>
  <style>
    :root { 
      --primary: #0f0c24; 
      --accent-gold: #D4AF37; 
      --accent-gold-gradient: linear-gradient(135deg, #FFE07D 0%, #D4AF37 50%, #A37F14 100%);
      --bg: radial-gradient(circle at center, #1d0f3a 0%, #0d061f 70%, #05020c 100%);
      --card-bg: rgba(22, 14, 43, 0.88);
      --card-border: rgba(212, 175, 55, 0.25);
      --text-muted: #bdaed6;
    }

    body { 
      background: var(--bg); 
      background-attachment: fixed; 
      color: #fff; 
      font-family: system-ui, -apple-system, sans-serif; 
      padding: 40px 20px; 
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .panel { 
      background: var(--card-bg); 
      padding: 40px 30px; 
      border-radius: 20px; 
      max-width: 650px; 
      margin: 0 auto; 
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--card-border); 
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.65), inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
      z-index: 10;
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 3px;
      background: var(--accent-gold-gradient);
    }

    .panel.celebrate-shake {
      animation: panelPopShake 0.6s cubic-bezier(.36,.07,.19,.97) both;
    }

    h2 { 
      margin-top: 0; 
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(180deg, #ffffff 40%, #dcd1ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1); 
      padding-bottom: 15px; 
      margin-bottom: 25px;
    }

    label { 
      display: block; 
      font-weight: 600; 
      color: var(--text-muted); 
      font-size: 13px; 
      text-transform: uppercase; 
      letter-spacing: 1px;
      margin-top: 20px; 
      margin-bottom: 8px; 
    }

    select, input { 
      width: 100%; 
      padding: 14px; 
      border: 1px solid rgba(255, 255, 255, 0.15); 
      border-radius: 10px; 
      box-sizing: border-box; 
      font-size: 16px; 
      background: rgba(255,255,255,0.05);
      color: #fff;
      outline: none;
      transition: all 0.2s;
    }

    select:focus, input:focus { border-color: var(--accent-gold); background: rgba(255,255,255,0.08); }
    select option { background: #1d0f3a; color: #fff; }
    .flex-row { display: flex; gap: 16px; }

    .btn-calc { 
      background: var(--accent-gold-gradient); 
      color: #0f0c24; 
      font-weight: 800; 
      border: none; 
      padding: 16px; 
      width: 100%; 
      margin-top: 25px; 
      border-radius: 10px; 
      font-size: 15px; 
      cursor: pointer; 
      text-transform: uppercase; 
      letter-spacing: 2px;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .btn-calc:hover { 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
      filter: brightness(1.1);
    }

    /* ─── PHYSICAL RAFFLE DRUM SYSTEM ─── */
    .suspense-box {
      display: none;
      text-align: center;
      margin-top: 30px;
      padding: 30px 20px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 14px;
      border: 1px dashed var(--accent-gold);
      position: relative;
    }

    .drum-stage {
      width: 100%;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      perspective: 1000px;
      margin-bottom: 15px;
    }

    /* Drum Body Structure */
    .drum-outer-rig {
      width: 260px;
      height: 160px;
      border: 4px solid var(--accent-gold);
      border-radius: 80px / 80px;
      position: relative;
      background: rgba(212, 175, 55, 0.03);
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.1), inset 0 0 20px rgba(0,0,0,0.6);
      transform-style: preserve-3d;
      transition: transform 0.1s linear;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Stand supports for look and feel */
    .drum-stage::before, .drum-stage::after {
      content: '';
      position: absolute;
      bottom: 20px;
      width: 12px;
      height: 110px;
      background: var(--accent-gold-gradient);
      border-radius: 6px;
      z-index: 2;
    }
    .drum-stage::before { left: calc(50% - 145px); transform: rotate(-15deg); }
    .drum-stage::after { right: calc(50% - 145px); transform: rotate(15deg); }

    .drum-floor-bar {
      position: absolute;
      bottom: 16px;
      width: 320px;
      height: 8px;
      background: var(--accent-gold-gradient);
      border-radius: 4px;
      left: calc(50% - 160px);
      z-index: 1;
    }

    /* Access hatch door mesh outline */
    .drum-hatch-door {
      position: absolute;
      width: 70px;
      height: 50px;
      border: 2px solid #fff;
      background: rgba(255, 255, 255, 0.1);
      left: calc(50% - 35px);
      top: calc(50% - 25px);
      border-radius: 4px;
      pointer-events: none;
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .drum-hatch-door.open {
      transform: translateY(-65px) rotateX(-90deg);
      background: rgba(255, 75, 75, 0.2);
      border-color: #ff4b4b;
    }

    /* Micro Tickets inside */
    .drum-ticket {
      position: absolute;
      width: 30px;
      height: 16px;
      background: #FFE07D;
      color: #0f0c24;
      font-size: 6px;
      font-weight: bold;
      border-radius: 2px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      pointer-events: none;
    }

    /* Outgoing Drawn Ticket Animation Container */
    .dispensed-ticket-tray {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%) scale(0);
      background: var(--accent-gold-gradient);
      color: #0f0c24;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 800;
      font-size: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      z-index: 20;
      white-space: nowrap;
      border: 1px solid #fff;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .dispensed-ticket-tray.active {
      transform: translateX(-50%) scale(1) translateY(-40px);
    }

    .status-ticker {
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: bold;
      margin-top: 10px;
    }

    /* ─── WINNERS PRESENTATION ─── */
    .winner-list { margin-top: 40px; display: none; }
    .winner-list h3 {
      font-size: 16px;
      letter-spacing: 2px;
      color: var(--accent-gold);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 12px;
      margin-bottom: 25px;
      text-align: center;
    }

    .winner-row { 
      display: flex; 
      justify-content: space-between; 
      background: linear-gradient(135deg, rgba(30, 20, 60, 0.9) 0%, rgba(15, 12, 36, 0.8) 100%);
      border: 1px solid var(--card-border);
      color: #fff; 
      padding: 18px 22px; 
      margin-bottom: 15px; 
      border-radius: 12px; 
      align-items: center; 
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      opacity: 0;
      transform: scale(0.3);
      animation: popOutRow 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    
    .rank { font-weight: 900; color: var(--accent-gold); font-size: 24px; text-shadow: 0 0 10px rgba(212,175,55,0.3); }
    .score-badge { font-family: monospace; font-weight: bold; font-size: 20px; color: var(--accent-gold); background: rgba(212,175,55,0.12); padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(212,175,55,0.3); }

    .confetti { position: fixed; width: 12px; height: 12px; background-color: var(--accent-gold); z-index: 1; top: -20px; border-radius: 3px; pointer-events: none; animation: fall linear forwards; }

    @keyframes popOutRow {
      0% { opacity: 0; transform: scale(0.4) translateY(40px); filter: brightness(2); }
      100% { opacity: 1; transform: scale(1) translateY(0); filter: brightness(1); }
    }
    @keyframes panelPopShake {
      0%, 100% { transform: scale(1) rotate(0deg); }
      15% { transform: scale(1.02) rotate(-1deg); }
      30% { transform: scale(1.02) rotate(1deg); }
    }
    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }

    @media print {
      body { background: #fff; color: #000; padding: 0; }
      .panel { box-shadow: none; max-width: 100%; border: none; background: transparent; }
      .btn-calc, form, .suspense-box, .confetti { display: none !important; }
      .winner-list { display: block !important; margin-top: 0; }
      .winner-row { background: #f5f5f5; color: #000; border: 1px solid #ccc; opacity: 1 !important; transform: none !important; }
    }
    @media (max-width: 480px) {
  .flex-row {
    flex-direction: column;
    gap: 10px;
  }
}
  </style>
</head>
<body>

<div class="panel" id="mainPanel">
  <h2>Staff Audit Resolution Portal</h2>
  
  <form id="resultForm" onsubmit="startSuspenseSequence(event)">
    <label for="actWin">Official Match Winner</label>
    <select id="actWin">
      <option value="Argentina">Argentina 🇦🇷</option>
      <option value="Spain">Spain 🇪🇸</option>
    </select>

    <div class="flex-row">
      <div style="flex:1;">
        <label>Final Score: Argentina</label>
        <input type="number" id="actArg" min="0" required value="0">
      </div>
      <div style="flex:1;">
        <label>Final Score: Spain</label>
        <input type="number" id="actSpa" min="0" required value="0">
      </div>
    </div>

    <button type="submit" class="btn-calc" id="submitBtn">Calculate &amp; Resolve Audit</button>
  </form>

  <!-- PHYSICAL RAFFLE DRUM INTERFACE MODULE -->
  <div id="suspenseArea" class="suspense-box">
    <div class="drum-stage">
      <div class="drum-outer-rig" id="drumBody">
        <!-- Hatch access door overlay -->
        <div class="drum-hatch-door" id="drumDoor"></div>
        <!-- Internal simulated dynamic tickets container -->
        <div id="ticketsInsidePool" style="position:absolute; inset:0;"></div>
      </div>
      <div class="drum-floor-bar"></div>
      
      <!-- Pop-out prize ticket selector -->
      <div class="dispensed-ticket-tray" id="dispensedTicket">
         🎟️ Winner: <span id="dispensedName">Processing...</span>
      </div>
    </div>
    <div class="status-ticker" id="statusMessage">Initializing Raffle Drum Core...</div>
  </div>

  <!-- WINNERS BOARD -->
  <div id="winnerListBlock" class="winner-list">
    <h3>🎉✨ 🎯 TOP 5 CLOSEST PREDICTIONS ARCHIVE ✨🎉</h3>
    <div id="winnersContainer"></div>
    <button class="btn-calc" style="background:#0f0c24; border: 1px solid var(--card-border); color:#fff; margin-top:20px;" onclick="window.print()">🖨️ Print Out Board</button>
  </div>
</div>

<script>
  let backendDataCache = null;
  let drumAngle = 0;
  let drumVelocity = 0;
  let drumAnimationLoop = null;
  let ticketElements = [];

  function spawnConfetti() {
    const colors = ['#FFE07D', '#D4AF37', '#A37F14', '#ffffff', '#a8bce8'];
    for(let i = 0; i < 80; i++) {
      setTimeout(() => {
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.width = Math.random() * 8 + 8 + 'px';
        confetti.style.height = confetti.style.width;
        confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
        confetti.style.opacity = Math.random();
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 4000);
      }, i * 25);
    }
  }

  // Populates physical internal bounding nodes matching tickets
  function populateDrumTickets() {
    const pool = document.getElementById('ticketsInsidePool');
    pool.innerHTML = '';
    ticketElements = [];
    
    // Generate 40 simulated cosmetic ticket vectors bouncing inside
    for(let i = 0; i < 45; i++) {
      const ticket = document.createElement('div');
      ticket.className = 'drum-ticket';
      
      // Randomize color shifts between Gold variations
      const colors = ['#FFE07D', '#D4AF37', '#FFF3CD'];
      ticket.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      
      // Initial spatial position distributions
      const state = {
        x: Math.random() * 180 + 30,
        y: Math.random() * 100 + 30,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8,
        rot: Math.random() * 360,
        rotV: (Math.random() - 0.5) * 15,
        el: ticket
      };
      
      ticket.style.transform = `translate(${state.x}px, ${state.y}px) rotate(${state.rot}deg)`;
      pool.appendChild(ticket);
      ticketElements.push(state);
    }
  }

  // Runs kinetic updates simulating tickets tumbling inside the cylinder walls
  function updateDrumPhysics() {
    drumAngle += drumVelocity;
    document.getElementById('drumBody').style.transform = `rotate(${drumAngle}deg)`;

    ticketElements.forEach(t => {
      if (drumVelocity > 2) {
        // High rotational velocity binds tickets outwards or mixes violently
        t.vx += (Math.random() - 0.5) * drumVelocity * 0.6;
        t.vy += (Math.random() - 0.5) * drumVelocity * 0.6;
      } else {
        // Gravitational downward settling pull when deceleration occurs
        t.vy += 0.3;
      }

      t.x += t.vx;
      t.y += t.vy;
      t.rot += t.rotV;

      // Elastic boundary crashes inside the drum oval box boundaries
      if (t.x < 15 || t.x > 225) { t.vx *= -0.7; t.x = t.x < 15 ? 15 : 225; }
      if (t.y < 15 || t.y > 135) { t.vy *= -0.7; t.y = t.y < 15 ? 15 : 135; }

      // Velocity structural limiting friction caps
      t.vx *= 0.98; t.vy *= 0.98;

      t.el.style.transform = `translate(${t.x}px, ${t.y}px) rotate(${t.rot}deg)`;
    });

    drumAnimationLoop = requestAnimationFrame(updateDrumPhysics);
  }

  async function startSuspenseSequence(e) {
    e.preventDefault();
    
    document.getElementById('winnerListBlock').style.display = 'none';
    document.getElementById('mainPanel').classList.remove('celebrate-shake');
    document.getElementById('drumDoor').classList.remove('open');
    document.getElementById('dispensedTicket').classList.remove('active');
    document.getElementById('suspenseArea').style.display = 'block';
    document.getElementById('submitBtn').disabled = true;

    populateDrumTickets();
    
    // Start engine loops
    drumVelocity = 25; // Super high start spin rate speed
    document.getElementById('statusMessage').innerText = "Shaking and Tumbling Tickets...";
    updateDrumPhysics();

    const payload = {
      actualWinner: document.getElementById('actWin').value,
      actualScoreArgentina: document.getElementById('actArg').value,
      actualScoreSpain: document.getElementById('actSpa').value
    };

    backendDataCache = null;
    fetch('/api/calculate-winners', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => { backendDataCache = data; })
    .catch(err => { console.error("Database prefetch failed", err); });

    // Step 2: Gradual Deceleration Stage
    setTimeout(() => {
      document.getElementById('statusMessage').innerText = "Slowing down drum velocity...";
      const slowDownInterval = setInterval(() => {
        drumVelocity *= 0.88;
        if (drumVelocity <= 0.2) {
          clearInterval(slowDownInterval);
          drumVelocity = 0;
          processHatchOpeningReveal();
        }
      }, 150);
    }, 2500);
  }

  function processHatchOpeningReveal() {
    if (!backendDataCache || !backendDataCache.success || backendDataCache.winners.length === 0) {
      cancelAnimationFrame(drumAnimationLoop);
      document.getElementById('suspenseArea').style.display = 'none';
      document.getElementById('submitBtn').disabled = false;
      alert("Audit calculation complete: No recorded database entries match these target configurations.");
      return;
    }

    document.getElementById('statusMessage').innerText = "Drum alignment verified. Accessing door hatch...";
    
    // Animate drum hatch frame door opening up
    setTimeout(() => {
      document.getElementById('drumDoor').classList.add('open');
      document.getElementById('statusMessage').innerText = "Drawing winning ticket out...";
      
      // Select the primary Grand Prize #1 Winner to show on the drawn ticket interface UI
      const primaryWinner = backendDataCache.winners[0];
      document.getElementById('dispensedName').innerText = `${primaryWinner.name} (${primaryWinner.score_argentina}-${primaryWinner.score_spain})`;

      setTimeout(() => {
        document.getElementById('dispensedTicket').classList.add('active');
        
        // Finalize transaction stack frame presentation tables
        setTimeout(() => {
          cancelAnimationFrame(drumAnimationLoop);
          revealFinalWinnersTable();
        }, 2200);

      }, 600);
    }, 800);
  }

  function revealFinalWinnersTable() {
  document.getElementById('suspenseArea').style.display = 'none';
  document.getElementById('submitBtn').disabled = false;

  spawnConfetti();
  document.getElementById('mainPanel').classList.add('celebrate-shake');

  const container = document.getElementById('winnersContainer');
  
  // In staff.html inside the revealFinalWinnersTable() function:
  container.innerHTML = backendDataCache.winners.map((w, index) => `
  <div class="winner-row">
    <div>
      <span class="rank">#${index + 1}</span>
      <strong>${w.name}</strong> 
      <small>(${new Date(w.created_at).toLocaleTimeString()})</small>
      <br><small style="color: gold;">Points: ${w.points}</small>
    </div>
    <div class="score-badge">${w.score_argentina} - ${w.score_spain}</div>
  </div>
`).join('');

  document.getElementById('winnerListBlock').style.display = 'block';
}
</script>
</body>
</html>
